name: Build Linux amd64

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-linux-amd64-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
        id: sccache

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-linux-amd64

      - name: Install musl tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools

      - name: Diagnose openssl-sys dependency source
        shell: bash
        run: |
          cargo generate-lockfile
          echo "=== Who needs openssl-sys? ==="
          cargo tree --target x86_64-unknown-linux-musl -i openssl-sys -e features 2>/dev/null || echo "(not in tree)"
          echo "=== Who needs native-tls? ==="
          cargo tree --target x86_64-unknown-linux-musl -i native-tls -e features 2>/dev/null || echo "(not in tree)"
          echo "=== Who needs hyper-tls? ==="
          cargo tree --target x86_64-unknown-linux-musl -i hyper-tls -e features 2>/dev/null || echo "(not in tree)"

      - name: Build release binary (static)
        shell: bash
        run: |
          rm -f Cargo.lock
          rm -rf target
          cargo generate-lockfile
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            export RUSTC_WRAPPER=sccache
          fi
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/jcode dist/jcode-linux-amd64
          chmod +x dist/jcode-linux-amd64
          cd dist && tar czf jcode-linux-amd64.tar.gz jcode-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcode-linux-amd64
          path: dist/jcode-linux-amd64.tar.gz
